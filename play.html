<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play</title>
  <style>
    body { margin: 0; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>

<iframe id="game"></iframe>

<script>
  const params = new URLSearchParams(location.search);
  const game = params.get("gameurl");

  if (!game) {
    alert("No game selected");
    location.href = "/";
  } else {
    document.getElementById("game").src = game;
  }
</script>

</body>
</html>
